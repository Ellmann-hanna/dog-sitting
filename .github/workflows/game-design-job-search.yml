name: Daily Game Design Job Search

on:
  schedule:
    # Runs every day at 8:00 AM Pacific Time (15:00 UTC)
    - cron: "0 15 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  issues: write
  contents: read

jobs:
  search-jobs:
    runs-on: ubuntu-latest
    env:
      ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      REPORT_PATH:    job_report.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run job search
        run: python scripts/job_search.py

      - name: Get today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Ensure job-search label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'job-search',
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'job-search',
                color: '0075ca',
                description: 'Daily automated game design job search results',
              });
              console.log('Created job-search label');
            }

      - name: Close previous daily job search issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: 'job-search',
              state:  'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: issue.number,
                state:        'closed',
              });
              console.log(`Closed old issue #${issue.number}`);
            }

      - name: Create GitHub issue with job listings
        id: create_issue
        uses: actions/github-script@v7
        env:
          TODAY: ${{ steps.date.outputs.today }}
        with:
          script: |
            const fs = require('fs');
            const body  = fs.readFileSync('job_report.md', 'utf8');
            const today = process.env.TODAY;
            const issue = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  `🎮 Game Design Jobs — ${today}`,
              body:   body,
              labels: ['job-search'],
            });
            console.log('Job search issue created successfully!');
            core.setOutput('issue_url', issue.data.html_url);

      - name: Convert report to HTML for email
        run: |
          pip install markdown 2>/dev/null
          python3 - <<'PYEOF'
          import markdown, pathlib
          md = pathlib.Path('job_report.md').read_text()
          html = markdown.markdown(md, extensions=['tables'])
          wrapped = f"""<!DOCTYPE html><html><head>
          <meta charset="utf-8">
          <style>
            body {{ font-family: Arial, sans-serif; max-width: 860px; margin: 0 auto; padding: 20px; color: #24292e; }}
            h1 {{ color: #0366d6; }} h2 {{ border-bottom: 1px solid #eee; padding-bottom: 6px; }}
            h3 {{ color: #24292e; }} a {{ color: #0366d6; }}
            blockquote {{ background: #f6f8fa; border-left: 4px solid #0366d6; padding: 8px 16px; margin: 4px 0; }}
            hr {{ border: none; border-top: 1px solid #eee; }}
          </style></head><body>{html}</body></html>"""
          pathlib.Path('job_report.html').write_text(wrapped)
          print("HTML report generated.")
          PYEOF

      - name: Send email with job listings
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: photosfg872@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🎮 Game Design Jobs for Caroline — ${{ steps.date.outputs.today }}"
          to: photosfg872@gmail.com
          from: "Caroline's Job Search <photosfg872@gmail.com>"
          html_body: file://job_report.html
          ignore_cert: false
