name: Daily Stock News Email

on:
  schedule:
    # Runs every day at 8:00 AM Pacific Time (15:00 UTC)
    - cron: "0 15 * * 1-5"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  send-stock-news:
    runs-on: ubuntu-latest
    env:
      REPORT_PATH: stock_news_report.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser yfinance markdown

      - name: Fetch stock news
        run: python scripts/stock_news.py

      - name: Get today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Convert report to HTML for email
        run: |
          python3 - <<'PYEOF'
          import markdown, pathlib
          md = pathlib.Path('stock_news_report.md').read_text()
          html = markdown.markdown(md, extensions=['tables'])
          wrapped = f"""<!DOCTYPE html><html><head>
          <meta charset="utf-8">
          <style>
            body {{ font-family: Arial, sans-serif; max-width: 860px; margin: 0 auto; padding: 20px; color: #24292e; }}
            h1 {{ color: #0366d6; }} h2 {{ border-bottom: 1px solid #eee; padding-bottom: 6px; }}
            h3 {{ color: #24292e; }} a {{ color: #0366d6; }}
            table {{ border-collapse: collapse; width: 100%; margin: 12px 0; }}
            th, td {{ border: 1px solid #dfe2e5; padding: 8px 12px; text-align: left; }}
            th {{ background: #f6f8fa; font-weight: 600; }}
            blockquote {{ background: #f6f8fa; border-left: 4px solid #0366d6; padding: 8px 16px; margin: 4px 0; }}
            hr {{ border: none; border-top: 1px solid #eee; }}
          </style></head><body>{html}</body></html>"""
          pathlib.Path('stock_news_report.html').write_text(wrapped)
          print("HTML report generated.")
          PYEOF

      - name: Send email with stock news
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          secure: false
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "📈 Stock Market News — ${{ steps.date.outputs.today }}"
          to: photosfg872@gmail.com
          from: "Stock News Digest <photosfg872@gmail.com>"
          html_body: file://stock_news_report.html
          ignore_cert: false
